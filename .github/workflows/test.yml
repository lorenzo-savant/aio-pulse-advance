name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps: next-intl's @swc/core peer-requires @swc/helpers
        # >=0.5.17, but next pins it to 0.5.15 — pre-existing peer-dep conflict.
        # Without this flag, npm ci refuses with 'Missing: @swc/helpers@0.5.21'.
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

  migration-drift-check:
    name: Migration ↔ Types Drift Check
    runs-on: ubuntu-latest
    # Catches the pattern that broke us in May 2026: a migration file
    # exists in the repo but `src/types/database.ts` doesn't reflect its
    # tables/columns — or vice versa. The check is "regenerate the types
    # from the linked DB and diff against what's checked in". Drift = fail.
    #
    # Requires SUPABASE_DB_URL (a connection string with read access) as
    # a repo secret. Without it the job soft-skips so forks/branches
    # without backend access don't get false reds. See docs/DECISIONS.md.
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Detect secret
        id: secret
        run: |
          if [ -n "${SUPABASE_DB_URL}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Drift check skipped::Add SUPABASE_DB_URL secret to enable schema-drift detection."
          fi

      - name: Checkout
        if: steps.secret.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.secret.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.secret.outputs.configured == 'true'
        run: npm ci --legacy-peer-deps

      - name: Regenerate types from remote DB
        if: steps.secret.outputs.configured == 'true'
        # Write the regenerated types to a path INSIDE the repo so
        # prettier picks up the repo's .prettierrc (semi: false +
        # singleQuote: true). Writing to /tmp first produced spurious
        # quoting/semicolon drift in May 2026 — see the CI archaeology.
        #
        # Use ./node_modules/.bin/supabase (the pinned dev-dep version
        # from package.json) instead of `npx supabase` — the latter
        # resolves to whichever version npm picks at runtime (latest
        # cached), causing version skew vs the local generator. Drift
        # was previously caused by the `__InternalSupabase` block
        # appearing in v2.100.1 output but not v2.101.0+. Pin removes
        # the wedge.
        run: |
          ./node_modules/.bin/supabase gen types typescript --db-url "$SUPABASE_DB_URL" \
            > src/types/database.regen.ts
          ./node_modules/.bin/prettier --write src/types/database.regen.ts

      - name: Diff against committed types
        if: steps.secret.outputs.configured == 'true'
        # Strip the __InternalSupabase metadata block before diffing.
        # `supabase gen types --linked` (used locally) emits this block
        # with the PostgrestVersion from project config; `--db-url`
        # (used in CI) doesn't because there's no project metadata to
        # read. This is CLI-version metadata, not schema drift, so the
        # check shouldn't trip on it. We re-run prettier after the
        # strip so leftover formatting from the regex doesn't produce
        # spurious whitespace drift.
        run: |
          node -e "
            const fs = require('fs');
            const strip = (f) => fs.writeFileSync(f, fs.readFileSync(f, 'utf8')
              .replace(/^\s*\/\/ Allows to automatically[^]*?^\s*__InternalSupabase: \{[^]*?^\s*\}\n/m, ''));
            strip('src/types/database.ts');
            strip('src/types/database.regen.ts');
          "
          ./node_modules/.bin/prettier --write src/types/database.ts src/types/database.regen.ts
          if ! diff -u src/types/database.ts src/types/database.regen.ts; then
            echo "::error title=Schema drift detected::src/types/database.ts is out of sync with the remote DB. Run 'npm run db:gen-types' locally and commit the result."
            exit 1
          fi

  security-audit:
    name: Security Audit (npm)
    runs-on: ubuntu-latest
    # Runs `npm audit --audit-level=moderate`. PRs that introduce a moderate+
    # advisory get a red check. Use `npm run security:audit:fix` locally to
    # resolve, or pin a known-good version if no fix is available yet.
    # BLOCKING: the dependency tree is clean (0 advisories as of 2026-06), so
    # this gate now enforces "don't regress". If a new advisory has no fix
    # available yet, add a documented override in package.json rather than
    # re-introducing continue-on-error.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm run security:audit

  policy-audit:
    name: RLS & Zod Coverage
    runs-on: ubuntu-latest
    # Static audits over supabase/migrations and src/app/api. Both scripts are
    # dependency-free (node:fs only) and need NO secrets or DB — so we skip
    # `npm ci` entirely for speed.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: RLS coverage (blocking)
        # --strict: fail the build if any `CREATE TABLE` in the migration repo
        # lacks a matching `ENABLE ROW LEVEL SECURITY`. Coverage is 51/51, so
        # this enforces "don't ship a table without RLS" going forward.
        run: npm run check:rls -- --strict

      - name: Zod coverage (blocking)
        # --strict: every non-exempt write handler must runtime-validate its
        # body. Coverage is 56/56 (16 routes are exempt in the script: cron,
        # the Stripe webhook, no-body triggers). This now enforces "don't ship
        # an unvalidated write handler". To intentionally exempt a new one, add
        # it to EXEMPT_SUFFIXES in scripts/audit-zod-coverage.mjs with a reason.
        run: npm run check:zod -- --strict

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    # Scans the committed working tree (NOT git history) for leaked secrets so
    # a new commit can't introduce an API key / token. `--no-git` keeps the
    # scan deterministic on the current files and avoids tripping on any
    # pre-existing history. INFORMATIONAL during the ramp (mirrors the
    # security-audit pattern this repo already uses): once a green run confirms
    # the tree is clean, drop `continue-on-error` to make it blocking.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        # --no-git: scan files as they are on disk (node_modules isn't installed
        # in this job, so only repo files are scanned). --redact hides matched
        # values from the log so CI output never echoes a real secret.
        run: gitleaks detect --no-git --redact --verbose

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps: next-intl's @swc/core peer-requires @swc/helpers
        # >=0.5.17, but next pins it to 0.5.15 — pre-existing peer-dep conflict.
        # Without this flag, npm ci refuses with 'Missing: @swc/helpers@0.5.21'.
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test -- --run

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E needs a fully-configured backend. With NO Supabase secrets wired the
    # Next server boots unconfigured and every backend-dependent test times out
    # (~34 min of red on main — the failure this guard fixes). We detect the
    # secrets and turn the job into a green no-op when they're absent, on EVERY
    # branch (this supersedes the old `security/*`-only skip). Wire the three
    # repo secrets (Settings → Secrets and variables → Actions) to enable the
    # real run.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - name: Detect backend secrets
        id: secrets
        run: |
          if [ -n "${NEXT_PUBLIC_SUPABASE_URL}" ] && [ -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=E2E skipped::Supabase secrets not set on this repo — E2E is a no-op. Add NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY and SUPABASE_SERVICE_KEY in Settings → Secrets to enable it."
          fi

      - name: Checkout code
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        # --legacy-peer-deps: next-intl's @swc/core peer-requires @swc/helpers
        # >=0.5.17, but next pins it to 0.5.15 — pre-existing peer-dep conflict.
        # Without this flag, npm ci refuses with 'Missing: @swc/helpers@0.5.21'.
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        if: steps.secrets.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.secrets.outputs.configured == 'true'
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always() && steps.secrets.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, e2e-tests]
    # A production `next build` evaluates routes that throw when the Supabase
    # env is missing ("Collecting page data" aborts). Same remedy as e2e-tests:
    # guard the build step on the secrets being present so the job is a green
    # no-op until they're wired, then builds for real. Placeholder values are
    # deliberately NOT injected — statically-rendered pages may fetch at build
    # time and would fail confusingly against a fake backend.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - name: Detect backend secrets
        id: secrets
        run: |
          if [ -n "${NEXT_PUBLIC_SUPABASE_URL}" ] && [ -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Build skipped::Supabase secrets not set — production build is a no-op until they're wired."
          fi

      - name: Checkout code
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        # --legacy-peer-deps: next-intl's @swc/core peer-requires @swc/helpers
        # >=0.5.17, but next pins it to 0.5.15 — pre-existing peer-dep conflict.
        # Without this flag, npm ci refuses with 'Missing: @swc/helpers@0.5.21'.
        run: npm ci --legacy-peer-deps

      - name: Build application
        if: steps.secrets.outputs.configured == 'true'
        run: npm run build
